version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  # Bump the generator-latex-template submodule (tracks the branch set in
  # .gitmodules) daily, so site content follows the generator with a one-PR lag.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "daily"
